<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elena Smirnova – Portfolio</title>
<meta name="title" content="Elena Smirnova – Portfolio">
<!-- Elena Smirnova – Portfolio -->
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--p:#2b3235;--pl:#4a5a60;--pb:#EDEEF0;--pbm:#DDE0E3;--txt:#1a1f21;--txtl:#556066;--white:#fff;--bdr:#d5d9db;}
html{scroll-behavior:smooth;}
body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;color:var(--txt);background:var(--white);line-height:1.75;}
nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--bdr);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:58px;}
.nav-links{display:flex;gap:1.6rem;list-style:none;}
.nav-links a{text-decoration:none;color:var(--txtl);font-size:0.78rem;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;transition:color 0.2s;}
.nav-links a:hover{color:var(--p);}
.lang-toggle{display:flex;gap:0.3rem;}
.lb{border:1.5px solid var(--bdr);background:none;padding:0.22rem 0.65rem;border-radius:5px;font-size:0.78rem;cursor:pointer;font-weight:700;color:var(--txtl);transition:all 0.2s;font-family:inherit;}
.lb.active{background:var(--p);color:#fff;border-color:var(--p);}
#hero{background:linear-gradient(140deg,var(--pb) 0%,#fff 65%);padding:4.5rem 2rem 3.5rem;}
.hero-in{max-width:900px;margin:0 auto;display:flex;gap:3rem;align-items:center;}
.ph-wrap{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:0.7rem;}
.ph{width:220px;height:270px;border-radius:14px;object-fit:cover;object-position:center top;border:4px solid var(--p);display:block;}
.ph-fb{width:220px;height:270px;border-radius:14px;background:var(--p);color:#fff;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;font-size:3rem;font-weight:700;border:4px solid var(--p);}
.ph-upload label{font-size:0.72rem;font-weight:600;color:var(--p);cursor:pointer;background:var(--pb);border:1.5px solid var(--p);padding:0.25rem 0.75rem;border-radius:20px;transition:background 0.2s;white-space:nowrap;}
.ph-upload label:hover{background:var(--pbm);}
#ph-input{display:none;}
.hero-txt h1{font-family:Georgia,'Times New Roman',serif;font-size:2.4rem;color:var(--p);font-weight:700;line-height:1.2;margin-bottom:0.5rem;}
.h-sub{font-size:0.97rem;color:var(--txtl);margin-bottom:0.3rem;}
.h-inst{font-size:0.88rem;color:var(--pl);font-weight:600;margin-bottom:1.3rem;}
.h-links{display:flex;gap:0.7rem;flex-wrap:wrap;}
.hl{display:inline-flex;align-items:center;gap:0.35rem;padding:0.38rem 0.9rem;border-radius:22px;background:var(--p);color:#fff;text-decoration:none;font-size:0.8rem;font-weight:500;transition:background 0.2s;}
.hl:hover{background:var(--pl);}
.hl.out{background:none;border:1.5px solid var(--p);color:var(--p);}
.hl.out:hover{background:var(--pb);}
section{padding:3.8rem 2rem;}
section.alt{background:var(--pb);}
.si{max-width:900px;margin:0 auto;}
.sh{font-family:Georgia,'Times New Roman',serif;font-size:1.75rem;color:var(--p);margin-bottom:1.8rem;padding-bottom:0.6rem;border-bottom:2.5px solid var(--p);}
.about-txt{font-size:0.97rem;max-width:820px;}
.card{background:#fff;border-radius:10px;padding:1.4rem 1.8rem;border-left:4px solid var(--p);margin-bottom:1.3rem;box-shadow:0 2px 10px rgba(43,50,53,0.08);}
.card-lbl{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.09em;color:var(--p);font-weight:700;margin-bottom:0.35rem;}
.card-title{font-family:Georgia,'Times New Roman',serif;font-size:1.1rem;font-weight:600;margin-bottom:0.35rem;}
.card-inst{font-size:0.86rem;color:var(--txtl);margin-bottom:0.75rem;}
.focus-tags{list-style:none;display:flex;flex-wrap:wrap;gap:0.45rem;}
.focus-tags li{background:var(--pb);color:var(--p);padding:0.22rem 0.7rem;border-radius:20px;font-size:0.78rem;font-weight:500;}
.sublbl{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.09em;color:var(--p);font-weight:700;margin:1.8rem 0 0.9rem;}
.tl{position:relative;padding-left:1.5rem;}
.tl::before{content:'';position:absolute;left:0;top:0.5rem;bottom:0;width:2px;background:var(--bdr);}
.tli{position:relative;margin-bottom:1.8rem;}
.tli::before{content:'';position:absolute;left:-1.82rem;top:0.45rem;width:10px;height:10px;border-radius:50%;background:var(--p);border:2px solid #fff;box-shadow:0 0 0 2px var(--p);}
.tl-role{font-weight:600;font-size:0.97rem;}
.tl-org{font-size:0.88rem;color:var(--p);font-weight:500;margin-top:0.1rem;}
.tl-period{font-size:0.78rem;color:var(--txtl);margin:0.15rem 0 0.35rem;}
.tl-desc{font-size:0.87rem;color:var(--txtl);}
.pub{padding:1rem 1.2rem;border-radius:8px;background:#fff;margin-bottom:0.9rem;border:1px solid var(--bdr);font-size:0.9rem;line-height:1.65;}
.conf-item{font-size:0.9rem;padding:0.8rem 1.2rem;background:var(--pbm);border-radius:8px;margin-bottom:0.8rem;line-height:1.65;}
.skills-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:1.3rem;}
.sc{background:#fff;border-radius:10px;padding:1.3rem 1.5rem;box-shadow:0 2px 8px rgba(43,50,53,0.07);}
.sc-title{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.09em;color:var(--p);font-weight:700;margin-bottom:0.9rem;}
.lt{width:100%;border-collapse:collapse;}
.lt tr{border-bottom:1px solid var(--bdr);}
.lt tr:last-child{border-bottom:none;}
.lt td{padding:0.38rem 0;font-size:0.88rem;}
.lt td:last-child{color:var(--txtl);font-size:0.83rem;text-align:right;}
.tags{display:flex;flex-wrap:wrap;gap:0.4rem;}
.tag{background:var(--pb);color:var(--p);padding:0.2rem 0.6rem;border-radius:12px;font-size:0.78rem;font-weight:500;}
.contact-grid{display:flex;flex-direction:column;gap:0.9rem;max-width:480px;}
.ci{display:flex;align-items:center;gap:0.9rem;font-size:0.95rem;}
.ci a{color:var(--p);text-decoration:none;}
.ci a:hover{text-decoration:underline;}
.cicon{width:38px;height:38px;border-radius:50%;background:var(--p);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
footer{text-align:center;padding:1.5rem;font-size:0.78rem;color:var(--txtl);border-top:1px solid var(--bdr);}
.card a{color:var(--p);}
@media(max-width:620px){.hero-in{flex-direction:column;align-items:center;text-align:center;}.h-links{justify-content:center;}.hero-txt h1{font-size:1.85rem;}nav{padding:0 1rem;}.nav-links{display:none;}}
</style>
</head>

function navTo(id){const el=document.getElementById(id);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});}
let lang='en';
function setLang(l){lang=l;document.querySelectorAll('.lb').forEach((b,i)=>b.classList.toggle('active',(i===0&&l==='en')||(i===1&&l==='de')));render();}

function tlHTML(items){
  return`<div class="tl">${items.map(e=>`<div class="tli">
    <div class="tl-role">${e.r}</div>
    <div class="tl-org">${e.o}</div>
    <div class="tl-period">${e.p}</div>
    ${e.d?`<div class="tl-desc">${e.d}</div>`:''}
  </div>`).join('')}</div>`;
}
